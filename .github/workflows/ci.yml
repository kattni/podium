name: CI
on:
  pull_request:
  push:
    branches:
      - main
  workflow_call:
    inputs:
      attest-package:
        description: "Create GitHub provenance attestation for the package."
        default: "false"
        type: string
    outputs:
      artifact-name:
        description: "Name of the uploaded artifact; use for artifact retrieval."
        value: ${{ jobs.package.outputs.artifact-name }}

# Cancel active CI runs for a PR before starting another run
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  FORCE_COLOR: "1"

jobs:
  pre-commit:
    name: Pre-commit checks
    uses: beeware/.github/.github/workflows/pre-commit-run.yml@main
    with:
      pre-commit-source: "--group pre-commit"

  towncrier:
    name: Check towncrier
    uses: beeware/.github/.github/workflows/towncrier-run.yml@main
    with:
      tox-source: "--group tox-uv"

  package:
    name: Build installer
    needs: [pre-commit, towncrier]
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            platform: macOS-latest

          - name: windows
            platform: windows-latest

          - name: ubuntu-24.04
            platform: ubuntu-24.04
            system-dependencies: |
              sudo apt-get update
              sudo apt install gir1.2-gtk-3.0 gir1.2-webkit2-4.1 \
                libcairo2-dev libcanberra-gtk3-module libgirepository-2.0-0 \
                libgirepository-2.0-dev

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install system dependencies
        if: matrix.system-dependencies
        run: ${{ matrix.system-dependencies }}

      - name: Build package
        run: |
          uvx briefcase package --adhoc-sign

      - name: Upload artefacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: installer-${{ matrix.name }}
          path: dist
